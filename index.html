<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#1A3A5C"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Vie EPBSE"/>
  <meta name="description" content="Événements et vie de l'Église Protestante Baptiste de Saint-Étienne"/>
  <title>Vie EPBSE</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--navy:#1A3A5C;--teal:#1D9E75;--teal-l:#E1F5EE;--gold-l:#FDF3DC;--coral-l:#FAECE7;--purple-l:#EEEDFE;--bg:#F4F6F9;--surface:#FFFFFF;--text:#0F1923;--text2:#4A5568;--text3:#8A96A3;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--r:14px;--rs:8px;--safe-bottom:env(safe-area-inset-bottom,0px);}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;max-width:430px;margin:0 auto;}
    #header{background:var(--navy);padding:48px 20px 16px;flex-shrink:0;}
    #hg{font-size:12px;color:rgba(255,255,255,.55);letter-spacing:.04em;}
    #ht{font-size:20px;font-weight:600;color:#fff;margin-top:3px;}
    #hs{font-size:12px;color:rgba(255,255,255,.45);margin-top:3px;}
    #screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:12px;}
    #navbar{background:var(--surface);border-top:0.5px solid var(--border2);display:flex;padding:6px 0 calc(6px + var(--safe-bottom));flex-shrink:0;}
    .ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px 4px;cursor:pointer;user-select:none;}
    .ni:active{opacity:.6;}
    .ni svg{width:24px;height:24px;}
    .nl{font-size:10px;color:var(--text3);}
    .ni.active .nl{color:var(--navy);font-weight:600;}
    .ndot{width:4px;height:4px;border-radius:50%;background:var(--navy);margin-top:1px;}
    .sh{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;padding:16px 16px 6px;}
    .ecard{background:var(--surface);margin:0 12px 8px;border-radius:var(--r);border:0.5px solid var(--border);padding:13px 14px;}
    .etop{display:flex;gap:10px;align-items:flex-start;}
    .eacc{width:3px;min-height:36px;border-radius:3px;flex-shrink:0;margin-top:2px;}
    .en{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;}
    .ed{font-size:12px;color:var(--text2);margin-top:3px;}
    .enote{font-size:11px;color:var(--text3);margin-top:2px;font-style:italic;}
    .brow{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;}
    .badge{font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;}
    .brecur{background:var(--bg);color:var(--text3);border:0.5px solid var(--border2);}
    .notif{background:var(--teal);margin:8px 12px;border-radius:var(--r);padding:12px 14px;display:flex;gap:12px;align-items:center;}
    .nib{width:36px;height:36px;border-radius:var(--rs);background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .nt{font-size:13px;font-weight:600;color:#fff;}
    .nb{font-size:12px;color:rgba(255,255,255,.8);margin-top:2px;}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 12px 4px;}
    .sc{background:var(--surface);border-radius:var(--rs);border:0.5px solid var(--border);padding:10px 12px;text-align:center;}
    .sn{font-size:22px;font-weight:600;color:var(--navy);}
    .sl{font-size:10px;color:var(--text3);margin-top:1px;}
    .wwrap{margin:0 12px 8px;overflow-x:auto;}
    .wtable{background:var(--surface);border-radius:var(--r);border:0.5px solid var(--border);overflow:hidden;min-width:340px;width:100%;}
    .wkh{display:grid;grid-template-columns:38px repeat(7,1fr);background:var(--navy);}
    .wkhc{font-size:10px;color:rgba(255,255,255,.8);font-weight:500;text-align:center;padding:7px 2px;line-height:1.4;}
    .wkr{display:grid;grid-template-columns:38px repeat(7,1fr);border-top:0.5px solid var(--border);}
    .wkt{font-size:9px;color:var(--text3);padding:5px 4px;display:flex;align-items:flex-start;justify-content:flex-end;}
    .wkc{border-left:0.5px solid var(--border);padding:2px;min-height:26px;}
    .wke{font-size:8px;font-weight:500;border-radius:3px;padding:2px 3px;margin-bottom:2px;color:#fff;line-height:1.3;}
    .tcard{background:var(--surface);margin:0 12px 8px;border-radius:var(--r);border:0.5px solid var(--border);overflow:hidden;}
    .thead{display:flex;align-items:center;gap:12px;padding:12px 14px;}
    .ticon{width:40px;height:40px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .tname{font-size:14px;font-weight:600;color:var(--text);}
    .tsub{font-size:12px;color:var(--text3);margin-top:2px;}
    .mlist{border-top:0.5px solid var(--border);}
    .mrow{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:0.5px solid var(--border);}
    .mrow:last-child{border-bottom:none;}
    .ava{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
    .mname{font-size:13px;font-weight:500;color:var(--text);flex:1;}
    .rpill{font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px;}
    .pin-bg{min-height:500px;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.5);}
    .pin-sheet{background:var(--surface);border-radius:22px 22px 0 0;padding:24px 20px 32px;width:100%;text-align:center;}
    .pin-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 20px;}
    .pin-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px;}
    .pin-sub{font-size:13px;color:var(--text3);margin-bottom:20px;}
    .pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:24px;}
    .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);background:var(--bg);}
    .pin-dot.filled{background:var(--navy);border-color:var(--navy);}
    .pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto;}
    .pin-key{padding:14px;border-radius:var(--rs);background:var(--bg);border:0.5px solid var(--border2);font-size:18px;font-weight:600;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;}
    .pin-key:active{background:var(--border2);}
    .pin-err{font-size:12px;color:#E24B4A;margin-top:12px;min-height:18px;}
    .ali{background:var(--surface);margin:0 12px 6px;border-radius:var(--rs);border:0.5px solid var(--border);padding:11px 14px;display:flex;align-items:center;gap:10px;}
    .adot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
    .atitle{font-size:13px;font-weight:500;color:var(--text);flex:1;}
    .adate{font-size:11px;color:var(--text3);}
    .del-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:4px 6px;color:#E24B4A;flex-shrink:0;}
    .edit-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:4px 6px;color:var(--text3);flex-shrink:0;}
    .fab{width:52px;height:52px;border-radius:50%;background:var(--navy);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;margin:4px 12px 4px auto;transition:transform .1s;}
    .fab:active{transform:scale(.93);}
    .modal-bg{min-height:540px;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.45);}
    .msheet{background:var(--surface);border-radius:22px 22px 0 0;padding:20px 18px 28px;width:100%;}
    .mhandle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 16px;}
    .mtitle{font-size:16px;font-weight:600;color:var(--text);margin-bottom:16px;}
    .flabel{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;}
    .finput{width:100%;font-size:13px;font-family:'DM Sans',sans-serif;padding:10px 12px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;}
    .finput:focus{border-color:var(--navy);}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .fg{margin-bottom:12px;}
    .chips{display:flex;flex-wrap:wrap;gap:6px;}
    .chip{font-size:11px;font-weight:500;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .12s;}
    .chip.on{background:var(--navy);color:#fff;border-color:var(--navy);}
    .btnrow{display:flex;gap:8px;margin-top:18px;}
    .bsave{flex:1;padding:12px;border-radius:var(--rs);background:var(--navy);color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;}
    .bsave:active{opacity:.8;}
    .bcanc{padding:12px 16px;border-radius:var(--rs);background:var(--bg);color:var(--text2);font-size:14px;border:1px solid var(--border2);cursor:pointer;font-family:'DM Sans',sans-serif;}
    .bdel{padding:12px 16px;border-radius:var(--rs);background:#FCEBEB;color:#A32D2D;font-size:14px;border:1px solid #F09595;cursor:pointer;font-family:'DM Sans',sans-serif;}
    .logout-btn{display:block;margin:8px 12px 0;padding:10px;border-radius:var(--rs);background:var(--bg);border:0.5px solid var(--border2);color:var(--text3);font-size:12px;text-align:center;cursor:pointer;font-family:'DM Sans',sans-serif;}
    .stabs{display:flex;gap:8px;padding:8px 12px 0;overflow-x:auto;}
    .stab{font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;border:0.5px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;white-space:nowrap;}
    .stab.on{background:var(--navy);color:#fff;border-color:var(--navy);}
    .merow{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:0.5px solid var(--border);}
    .merow:last-child{border-bottom:none;}
    .loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text3);font-size:13px;}
    .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);display:inline-block;margin-right:6px;animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  </style>
</head>
<body>
<div id="header">
  <div id="hg">Église Protestante Baptiste</div>
  <div id="ht">Vie EPBSE</div>
  <div id="hs">Connexion…</div>
</div>
<div id="screen"><div class="loading"><span class="sync-dot"></span>Chargement…</div></div>
<nav id="navbar">
  <div class="ni active" data-s="accueil" onclick="go('accueil')">
    <svg viewBox="0 0 24 24" fill="none"><path d="M3 11.5L12 4l9 7.5V21a1 1 0 01-1 1H4a1 1 0 01-1-1V11.5z" stroke="#1A3A5C" stroke-width="1.6"/><rect x="9" y="15" width="6" height="7" rx="1" stroke="#1A3A5C" stroke-width="1.6"/></svg>
    <div class="nl">Accueil</div><div class="ndot"></div>
  </div>
  <div class="ni" data-s="planning" onclick="go('planning')">
    <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="16" rx="2" stroke="#8A96A3" stroke-width="1.6"/><path d="M8 4v4M16 4v4M3 11h18" stroke="#8A96A3" stroke-width="1.6"/></svg>
    <div class="nl">Planning</div>
  </div>
  <div class="ni" data-s="equipes" onclick="go('equipes')">
    <svg viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3.5" stroke="#8A96A3" stroke-width="1.6"/><circle cx="17" cy="8" r="3.5" stroke="#8A96A3" stroke-width="1.6"/><path d="M2 20c0-3.5 3-6 7-6s7 2.5 7 6" stroke="#8A96A3" stroke-width="1.6"/><path d="M17 14c2.5.5 5 2.2 5 6" stroke="#8A96A3" stroke-width="1.6"/></svg>
    <div class="nl">Équipes</div>
  </div>
  <div class="ni" data-s="admin" onclick="go('admin')">
    <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3.5" stroke="#8A96A3" stroke-width="1.6"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4l1.4-1.4M17 7l1.4-1.4" stroke="#8A96A3" stroke-width="1.6"/></svg>
    <div class="nl">Admin</div>
  </div>
</nav>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, getDocs, addDoc, updateDoc, deleteDoc, onSnapshot, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyACko46r9xqkamWAWGMmVsB8_eNSWz-yB4",
  authDomain: "vie-epbse.firebaseapp.com",
  projectId: "vie-epbse",
  storageBucket: "vie-epbse.firebasestorage.app",
  messagingSenderId: "157013246059",
  appId: "1:157013246059:web:ca58234fbf83df4945312e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const BS={son:{bg:'#EEEDFE',c:'#3C3489'},louange:{bg:'#FDF3DC',c:'#854F0B'},menage:{bg:'#E1F5EE',c:'#085041'},ed:{bg:'#E6F1FB',c:'#0C447C'},all:{bg:'#F1EFE8',c:'#444441'},conseil:{bg:'#FAECE7',c:'#712B13'}};
const BL={son:'Son',louange:'Louange',menage:'Ménage',ed:'Éc. dimanche',all:'Tous',conseil:'Conseil'};
const MCOLS=[['#534AB7','#EEEDFE'],['#EF9F27','#FDF3DC'],['#1D9E75','#E1F5EE'],['#378ADD','#E6F1FB'],['#D85A30','#FAECE7'],['#888780','#F1EFE8']];
const TCOLS=['#EEEDFE','#FDF3DC','#E1F5EE','#E6F1FB','#FAECE7','#F1EFE8'];
const PIN='4200';

let EVENTS=[], TEAMS=[];
let cur='accueil', adminUnlocked=false, pinEntry='';
let adminTab='events', modalType='', editEvtId=null, editTeamId=null, editMemberId=null;
let selTeams=[], selColorIdx=0;
let loaded=false;

function fmtD(d){return new Date(d+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});}
function fmtT(t){return t.replace(':','h');}
function today(){return new Date().toISOString().split('T')[0];}
function ini(n){return(n||'').split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?';}
function bdg(t){const s=BS[t]||{bg:'#eee',c:'#555'};return`<span class="badge" style="background:${s.bg};color:${s.c};">${BL[t]||t}</span>`;}

// ── Firestore listeners ──
onSnapshot(collection(db,'events'), snap=>{
  EVENTS=snap.docs.map(d=>({id:d.id,...d.data()}));
  if(loaded) render();
});
onSnapshot(collection(db,'teams'), snap=>{
  TEAMS=snap.docs.map(d=>({id:d.id,...d.data()}));
  loaded=true;
  document.getElementById('hs').textContent=`Données synchronisées`;
  render();
});

// ── Seed default data if empty ──
async function seedIfEmpty(){
  const evSnap=await getDocs(collection(db,'events'));
  if(evSnap.empty){
    const defEvts=[
      {title:'Culte du dimanche',date:'2026-04-27',time:'10:00',color:'#1A3A5C',teams:['son','louange','all'],recur:'Chaque dimanche',notes:''},
      {title:'École du dimanche',date:'2026-04-27',time:'10:00',color:'#185FA5',teams:['ed'],recur:'Chaque dimanche',notes:'Groupe 6–12 ans'},
      {title:'Répétition louange',date:'2026-04-25',time:'19:00',color:'#854F0B',teams:['louange','son'],recur:'Vendredi soir',notes:'Salle principale'},
      {title:'Ménage du local',date:'2026-04-26',time:'09:00',color:'#0F6E56',teams:['menage'],recur:'Samedi matin',notes:'Nef + toilettes'},
    ];
    for(const e of defEvts) await addDoc(collection(db,'events'),e);
  }
  const tSnap=await getDocs(collection(db,'teams'));
  if(tSnap.empty){
    const defTeams=[
      {name:'Équipe sonorisation',icon:'🎚',iconBg:'#EEEDFE',order:0,members:[{id:1,name:'Victor',role:'Resp. son',ini:'VI',bg:'#534AB7',tc:'#EEEDFE'},{id:2,name:'Etienne',role:'Technicien',ini:'ET',bg:'#7F77DD',tc:'#EEEDFE'}]},
      {name:'Équipe louange',icon:'🎵',iconBg:'#FDF3DC',order:1,members:[{id:3,name:'Sarah',role:'Resp. louange',ini:'SA',bg:'#EF9F27',tc:'#FDF3DC'},{id:4,name:'David',role:'Guitare',ini:'DA',bg:'#FAC775',tc:'#633806'}]},
      {name:'Équipe ménage',icon:'🧹',iconBg:'#E1F5EE',order:2,members:[{id:5,name:'Marie',role:'Coordinatrice',ini:'MI',bg:'#1D9E75',tc:'#E1F5EE'}]},
      {name:'École du dimanche',icon:'📖',iconBg:'#E6F1FB',order:3,members:[{id:6,name:'Esther',role:'Responsable',ini:'ES',bg:'#378ADD',tc:'#E6F1FB'}]},
    ];
    for(const t of defTeams) await addDoc(collection(db,'teams'),t);
  }
}
seedIfEmpty();

// ── Navigation ──
function go(s){
  cur=s; modalType=''; editEvtId=null; editTeamId=null; editMemberId=null; selTeams=[];
  document.querySelectorAll('.ni').forEach(el=>{
    const on=el.dataset.s===s;
    el.classList.toggle('active',on);
    el.querySelector('.nl').style.color=on?'var(--navy)':'';
    const d=el.querySelector('.ndot');if(d)d.remove();
    if(on){const nd=document.createElement('div');nd.className='ndot';el.appendChild(nd);}
  });
  render();
}
window.go=go;

function render(){
  if(!loaded) return;
  const sc=document.getElementById('screen');
  if(cur==='accueil') rAccueil(sc);
  else if(cur==='planning') rPlanning(sc);
  else if(cur==='equipes') rEquipes(sc);
  else if(cur==='admin') rAdmin(sc);
}

function rAccueil(s){
  document.getElementById('hg').textContent='Église Protestante Baptiste';
  document.getElementById('ht').textContent='Vie EPBSE';
  const td=today();
  const up=EVENTS.filter(e=>e.date>=td).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const sw=up.filter(e=>(new Date(e.date+'T12:00:00')-new Date())/86400000<=7);
  document.getElementById("hs").innerHTML=`<span class="sync-dot"></span>${sw.length} événement${sw.length>1?'s':''} · sync en temps réel`;
  const nxt=up[0];
  let h='';
  if(nxt){
    const diff=Math.ceil((new Date(nxt.date+'T12:00:00')-new Date())/86400000);
    const when=diff<=0?"aujourd'hui":diff===1?'demain':`dans ${diff} jours`;
    h+=`<div class="notif"><div class="nib"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 1a6 6 0 016 6c0 3.5 1.5 5 1.5 5h-15S3 10.5 3 7a6 6 0 016-6zM7 14a2 2 0 004 0" stroke="#fff" stroke-width="1.4"/></svg></div><div><div class="nt">Prochain : ${nxt.title}</div><div class="nb">${fmtD(nxt.date)} · ${fmtT(nxt.time)} · <strong>${when}</strong></div></div></div>`;
  }
  h+=`<div class="stats"><div class="sc"><div class="sn">${up.length}</div><div class="sl">À venir</div></div><div class="sc"><div class="sn">${sw.length}</div><div class="sl">Cette sem.</div></div><div class="sc"><div class="sn">${TEAMS.reduce((a,t)=>a+(t.members||[]).length,0)}</div><div class="sl">Bénévoles</div></div></div>`;
  h+='<div class="sh">Prochains événements</div>';
  up.slice(0,6).forEach(e=>{
    h+=`<div class="ecard"><div class="etop"><div class="eacc" style="background:${e.color};"></div><div style="flex:1;"><div class="en">${e.title}</div><div class="ed">${fmtD(e.date)} · ${fmtT(e.time)}</div>${e.notes?`<div class="enote">${e.notes}</div>`:''}</div></div><div class="brow">${(e.teams||[]).map(t=>bdg(t)).join('')}${e.recur?`<span class="badge brecur">↻ ${e.recur}</span>`:''}</div></div>`;
  });
  s.innerHTML=h;
}

function rPlanning(s){
  document.getElementById('hg').textContent='Vue calendrier';
  document.getElementById('ht').textContent='Planning';
  const now=new Date();
  const monday=new Date(now);monday.setDate(now.getDate()-now.getDay()+1);
  const DAYS=Array.from({length:7},(_,i)=>{const d=new Date(monday);d.setDate(monday.getDate()+i);return{d:['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'][i],dt:String(d.getDate()).padStart(2,'0'),full:d.toISOString().split('T')[0]};});
  document.getElementById('hs').textContent=`Semaine du ${DAYS[0].dt} au ${DAYS[6].dt}`;
  const SLOTS=['08h','09h','10h','11h','18h','19h','20h'];
  const wEvts=EVENTS.filter(e=>DAYS.some(d=>d.full===e.date));
  let h='<div class="sh">Cette semaine</div><div class="wwrap"><div class="wtable"><div class="wkh"><div class="wkhc"></div>';
  DAYS.forEach(d=>{h+=`<div class="wkhc">${d.d}<br><span style="opacity:.6;font-size:9px;">${d.dt}</span></div>`;});
  h+='</div>';
  SLOTS.forEach(slot=>{
    h+=`<div class="wkr"><div class="wkt">${slot}</div>`;
    DAYS.forEach(day=>{
      const m=wEvts.filter(e=>e.date===day.full&&parseInt(e.time)===parseInt(slot));
      h+=`<div class="wkc">${m.map(x=>`<div class="wke" style="background:${x.color};">${x.title.split(' ').slice(0,2).join(' ')}</div>`).join('')}</div>`;
    });
    h+='</div>';
  });
  h+='</div></div>';
  const td=today();
  const all=EVENTS.slice().sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  h+='<div class="sh">À venir</div>';
  all.filter(e=>e.date>=td).forEach(e=>{
    h+=`<div class="ecard"><div class="etop"><div class="eacc" style="background:${e.color};"></div><div style="flex:1;"><div class="en">${e.title}</div><div class="ed">${fmtD(e.date)} · ${fmtT(e.time)}</div></div></div><div class="brow">${(e.teams||[]).map(t=>bdg(t)).join('')}</div></div>`;
  });
  s.innerHTML=h;
}

function rEquipes(s){
  document.getElementById('hg').textContent='Responsables & bénévoles';
  document.getElementById('ht').textContent='Équipes';
  document.getElementById('hs').textContent=`${TEAMS.length} équipes · ${TEAMS.reduce((a,t)=>a+(t.members||[]).length,0)} membres`;
  let h='';
  TEAMS.slice().sort((a,b)=>(a.order||0)-(b.order||0)).forEach(t=>{
    h+=`<div class="sh">${t.name}</div><div class="tcard"><div class="thead"><div class="ticon" style="background:${t.iconBg};">${t.icon}</div><div><div class="tname">${t.name}</div><div class="tsub">${(t.members||[]).length} membre${(t.members||[]).length>1?'s':''}</div></div></div><div class="mlist">${(t.members||[]).map(m=>`<div class="mrow"><div class="ava" style="background:${m.bg};color:${m.tc};">${m.ini||ini(m.name)}</div><span class="mname">${m.name}</span><span class="rpill" style="background:${t.iconBg};color:${m.bg};">${m.role}</span></div>`).join('')}</div></div>`;
  });
  s.innerHTML=h;
}

function rAdmin(s){
  document.getElementById('hg').textContent='Gestion';
  document.getElementById('ht').textContent='Administration';
  document.getElementById('hs').textContent=adminUnlocked?'Session active':'Réservé aux responsables';

  if(!adminUnlocked){
    pinEntry='';
    s.innerHTML=`<div class="pin-bg"><div class="pin-sheet"><div class="pin-handle"></div><div class="pin-title">Espace responsables</div><div class="pin-sub">Entrez votre code PIN</div><div class="pin-dots" id="pindots">${[0,1,2,3].map(i=>`<div class="pin-dot" id="pd${i}"></div>`).join('')}</div><div class="pin-grid">${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k=>`<button class="pin-key" onclick="pinKey('${k}')">${k}</button>`).join('')}</div><div class="pin-err" id="pinerr"></div></div></div>`;
    return;
  }

  const tabs=`<div class="stabs"><div class="stab${adminTab==='events'?' on':''}" onclick="setTab('events')">Événements</div><div class="stab${adminTab==='teams'?' on':''}" onclick="setTab('teams')">Équipes</div></div>`;

  if(modalType==='event'){
    const e=editEvtId?EVENTS.find(x=>x.id===editEvtId):null;
    s.innerHTML=`<div class="modal-bg"><div class="msheet"><div class="mhandle"></div><div class="mtitle">${e?'Modifier':'Nouvel événement'}</div>
    <div class="fg"><div class="flabel">Titre</div><input class="finput" id="ft" value="${e?e.title:''}" placeholder="ex: Culte du dimanche"/></div>
    <div class="frow"><div class="fg"><div class="flabel">Date</div><input class="finput" type="date" id="fd" value="${e?e.date:today()}"/></div><div class="fg"><div class="flabel">Heure</div><input class="finput" type="time" id="fh" value="${e?e.time:'10:00'}"/></div></div>
    <div class="fg"><div class="flabel">Équipes</div><div class="chips">${Object.entries(BL).map(([k,v])=>`<div class="chip${selTeams.includes(k)?' on':''}" onclick="togChip('${k}')">${v}</div>`).join('')}</div></div>
    <div class="fg"><div class="flabel">Récurrence</div><input class="finput" id="fr" value="${e?e.recur:''}" placeholder="ex: Chaque dimanche"/></div>
    <div class="fg"><div class="flabel">Notes</div><input class="finput" id="fn" value="${e?e.notes:''}" placeholder="Lieu, détails…"/></div>
    <div class="btnrow"><button class="bcanc" onclick="closeModal()">Annuler</button>${e?`<button class="bdel" onclick="delEvt('${e.id}')">Supprimer</button>`:''}<button class="bsave" onclick="saveEvt()">Enregistrer</button></div>
    </div></div>`;
    return;
  }

  if(modalType==='team'){
    const t=editTeamId?TEAMS.find(x=>x.id===editTeamId):null;
    s.innerHTML=`<div class="modal-bg"><div class="msheet"><div class="mhandle"></div><div class="mtitle">${t?'Modifier l\'équipe':'Nouvelle équipe'}</div>
    <div class="fg"><div class="flabel">Nom</div><input class="finput" id="tname" value="${t?t.name:''}" placeholder="ex: Équipe accueil"/></div>
    <div class="frow"><div class="fg"><div class="flabel">Icône</div><input class="finput" id="ticon" value="${t?t.icon:'👥'}"/></div><div class="fg"><div class="flabel">Couleur</div><select class="finput" id="tbg">${TCOLS.map(c=>`<option value="${c}"${t&&t.iconBg===c?' selected':''}>${c}</option>`).join('')}</select></div></div>
    <div class="btnrow"><button class="bcanc" onclick="closeModal()">Annuler</button>${t?`<button class="bdel" onclick="delTeam('${t.id}')">Supprimer</button>`:''}<button class="bsave" onclick="saveTeam()">Enregistrer</button></div>
    </div></div>`;
    return;
  }

  if(modalType==='member'||modalType==='addmember'){
    const t=TEAMS.find(x=>x.id===editTeamId);
    const m=editMemberId&&t?(t.members||[]).find(x=>x.id===editMemberId):null;
    s.innerHTML=`<div class="modal-bg"><div class="msheet"><div class="mhandle"></div><div class="mtitle">${m?'Modifier le membre':'Ajouter un membre'}</div>
    <div class="fg"><div class="flabel">Prénom / Nom</div><input class="finput" id="mname" value="${m?m.name:''}" placeholder="ex: Jean Dupont"/></div>
    <div class="fg"><div class="flabel">Rôle</div><input class="finput" id="mrole" value="${m?m.role:''}" placeholder="ex: Responsable"/></div>
    <div class="fg"><div class="flabel">Couleur avatar</div><div class="chips">${MCOLS.map((c,i)=>`<div class="chip${selColorIdx===i?' on':''}" style="${selColorIdx===i?`background:${c[0]};color:#fff;border-color:${c[0]}`:''}" onclick="selCol(${i})">${c[0].slice(1,4)}</div>`).join('')}</div></div>
    <div class="btnrow"><button class="bcanc" onclick="closeModal()">Annuler</button>${m?`<button class="bdel" onclick="delMember(${m.id})">Retirer</button>`:''}<button class="bsave" onclick="saveMember()">Enregistrer</button></div>
    </div></div>`;
    return;
  }

  let h=tabs;
  if(adminTab==='events'){
    h+='<div class="sh">Événements ('+EVENTS.length+')</div>';
    EVENTS.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>{
      h+=`<div class="ali"><div class="adot" style="background:${e.color};"></div><div style="flex:1;"><div class="atitle">${e.title}</div><div class="adate">${fmtD(e.date)} · ${fmtT(e.time)}</div></div><button class="edit-btn" onclick="openEditEvt('${e.id}')">✏️</button><button class="del-btn" onclick="delEvt('${e.id}')">🗑</button></div>`;
    });
    h+=`<button class="fab" onclick="openNewEvt()"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 4v14M4 11h14" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg></button>`;
  }
  if(adminTab==='teams'){
    h+='<div class="sh">Équipes ('+TEAMS.length+')</div>';
    TEAMS.slice().sort((a,b)=>(a.order||0)-(b.order||0)).forEach(t=>{
      h+=`<div class="tcard" style="margin:0 12px 8px;"><div class="thead"><div class="ticon" style="background:${t.iconBg};">${t.icon}</div><div style="flex:1;"><div class="tname">${t.name}</div><div class="tsub">${(t.members||[]).length} membre${(t.members||[]).length>1?'s':''}</div></div><button class="edit-btn" onclick="openEditTeam('${t.id}')">✏️</button><button class="del-btn" onclick="delTeam('${t.id}')">🗑</button></div>
      <div class="mlist">
        ${(t.members||[]).map(m=>`<div class="merow"><div class="ava" style="background:${m.bg};color:${m.tc};width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;">${m.ini||ini(m.name)}</div><span style="flex:1;font-size:13px;color:var(--text);">${m.name}</span><span style="font-size:11px;color:var(--text3);">${m.role}</span><button class="edit-btn" onclick="openEditMember('${t.id}',${m.id})">✏️</button><button class="del-btn" onclick="delMember(${m.id},'${t.id}')">🗑</button></div>`).join('')}
        <div style="padding:8px 14px;"><button style="font-size:12px;color:var(--navy);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;" onclick="openAddMember('${t.id}')">+ Ajouter un membre</button></div>
      </div></div>`;
    });
    h+=`<button class="fab" onclick="openNewTeam()"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 4v14M4 11h14" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg></button>`;
  }
  h+=`<button class="logout-btn" onclick="logout()">Déconnexion session admin</button>`;
  s.innerHTML=h;
}

// ── PIN ──
function pinKey(k){
  if(k==='')return;
  if(k==='⌫'){pinEntry=pinEntry.slice(0,-1);updDots();return;}
  if(pinEntry.length>=4)return;
  pinEntry+=k;updDots();
  if(pinEntry.length===4){
    if(pinEntry===PIN){adminUnlocked=true;setTimeout(()=>rAdmin(document.getElementById('screen')),200);}
    else{document.getElementById('pinerr').textContent='Code incorrect.';setTimeout(()=>{pinEntry='';updDots();document.getElementById('pinerr').textContent='';},1000);}
  }
}
function updDots(){for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d)d.className='pin-dot'+(i<pinEntry.length?' filled':'');}}
function logout(){adminUnlocked=false;pinEntry='';go('accueil');}
function setTab(t){adminTab=t;rAdmin(document.getElementById('screen'));}
function closeModal(){modalType='';editEvtId=null;editTeamId=null;editMemberId=null;selTeams=[];rAdmin(document.getElementById('screen'));}

// ── EVENTS CRUD ──
function openNewEvt(){modalType='event';editEvtId=null;selTeams=[];rAdmin(document.getElementById('screen'));}
function openEditEvt(id){modalType='event';editEvtId=id;const e=EVENTS.find(x=>x.id===id);selTeams=e?[...(e.teams||[])]:[];rAdmin(document.getElementById('screen'));}
function togChip(k){const i=selTeams.indexOf(k);if(i>=0)selTeams.splice(i,1);else selTeams.push(k);rAdmin(document.getElementById('screen'));}

async function saveEvt(){
  const title=(document.getElementById('ft')?.value||'').trim();
  if(!title){alert('Merci de saisir un titre.');return;}
  const date=document.getElementById('fd')?.value||today();
  const time=document.getElementById('fh')?.value||'10:00';
  const recur=(document.getElementById('fr')?.value||'').trim();
  const notes=(document.getElementById('fn')?.value||'').trim();
  const cols=['#1A3A5C','#185FA5','#854F0B','#0F6E56','#533AB7','#D85A30'];
  const data={title,date,time,recur,notes,teams:selTeams.length?selTeams:['all']};
  if(editEvtId){
    await updateDoc(doc(db,'events',editEvtId),data);
  } else {
    data.color=cols[EVENTS.length%cols.length];
    await addDoc(collection(db,'events'),data);
  }
  closeModal();
}

async function delEvt(id){
  if(!confirm('Supprimer cet événement ?'))return;
  await deleteDoc(doc(db,'events',id));
  modalType='';editEvtId=null;rAdmin(document.getElementById('screen'));
}

// ── TEAMS CRUD ──
function openNewTeam(){modalType='team';editTeamId=null;rAdmin(document.getElementById('screen'));}
function openEditTeam(id){modalType='team';editTeamId=id;rAdmin(document.getElementById('screen'));}

async function saveTeam(){
  const name=(document.getElementById('tname')?.value||'').trim();
  if(!name){alert('Merci de saisir un nom.');return;}
  const icon=document.getElementById('ticon')?.value||'👥';
  const iconBg=document.getElementById('tbg')?.value||TCOLS[0];
  if(editTeamId){
    await updateDoc(doc(db,'teams',editTeamId),{name,icon,iconBg});
  } else {
    await addDoc(collection(db,'teams'),{name,icon,iconBg,order:TEAMS.length,members:[]});
  }
  closeModal();
}

async function delTeam(id){
  if(!confirm('Supprimer cette équipe et tous ses membres ?'))return;
  await deleteDoc(doc(db,'teams',id));
  modalType='';editTeamId=null;rAdmin(document.getElementById('screen'));
}

// ── MEMBERS CRUD ──
function openAddMember(tid){modalType='addmember';editTeamId=tid;editMemberId=null;selColorIdx=0;rAdmin(document.getElementById('screen'));}
function openEditMember(tid,mid){modalType='member';editTeamId=tid;editMemberId=mid;const t=TEAMS.find(x=>x.id===tid);const m=(t?.members||[]).find(x=>x.id===mid);selColorIdx=m?MCOLS.findIndex(c=>c[0]===m.bg):0;if(selColorIdx<0)selColorIdx=0;rAdmin(document.getElementById('screen'));}
function selCol(i){selColorIdx=i;rAdmin(document.getElementById('screen'));}

async function saveMember(){
  const name=(document.getElementById('mname')?.value||'').trim();
  if(!name){alert('Merci de saisir un prénom.');return;}
  const role=(document.getElementById('mrole')?.value||'').trim()||'Membre';
  const [bg,tc]=MCOLS[selColorIdx]||MCOLS[0];
  const t=TEAMS.find(x=>x.id===editTeamId);
  if(!t)return;
  const members=[...(t.members||[])];
  if(editMemberId){
    const idx=members.findIndex(x=>x.id===editMemberId);
    if(idx>=0)members[idx]={...members[idx],name,role,bg,tc,ini:ini(name)};
  } else {
    members.push({id:Date.now(),name,role,ini:ini(name),bg,tc});
  }
  await updateDoc(doc(db,'teams',editTeamId),{members});
  closeModal();
}

async function delMember(mid,tid){
  if(!confirm('Retirer ce membre ?'))return;
  const teamId=tid||editTeamId;
  const t=TEAMS.find(x=>x.id===teamId);
  if(!t)return;
  const members=(t.members||[]).filter(m=>m.id!==mid);
  await updateDoc(doc(db,'teams',teamId),{members});
  modalType='';rAdmin(document.getElementById('screen'));
}

// Expose functions globally
window.pinKey=pinKey;window.logout=logout;window.setTab=setTab;window.closeModal=closeModal;
window.openNewEvt=openNewEvt;window.openEditEvt=openEditEvt;window.togChip=togChip;window.saveEvt=saveEvt;window.delEvt=delEvt;
window.openNewTeam=openNewTeam;window.openEditTeam=openEditTeam;window.saveTeam=saveTeam;window.delTeam=delTeam;
window.openAddMember=openAddMember;window.openEditMember=openEditMember;window.selCol=selCol;window.saveMember=saveMember;window.delMember=delMember;

if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}
</script>
</body>
</html>
